# Pipeline CI/CD para el proyecto carrito-compras (TiendaUV).
#
# Orden de ejecucion:
#
#   tests-rapidos
#        |
#        v
#   tests-integracion
#        |
#        v
#   tests-sistema
#        |
#        v
#   tests-rendimiento  (solo push a main)

name: Pipeline CI/CD TiendaUV

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  MIN_COVERAGE: "80"

# =============================================================================
# JOB 1: Tests rapidos
#
# Corre sin Docker. La API usa sqlite:///:memory: con StaticPool como fallback
# automatico cuando DATABASE_URL no esta seteada. Incluye lint, tests unitarios,
# BDD, funcionales, tabla de decision y seguridad. Es la compuerta principal:
# si falla aqui no se ejecutan los jobs posteriores.
# =============================================================================
jobs:
  tests-rapidos:
    name: Tests Rapidos
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --dev

      - name: Verificar lint con ruff
        run: uv run ruff check src/ tests/ --output-format=github

      - name: Verificar formato con ruff
        run: uv run ruff format --check src/ tests/

      - name: Ejecutar suite rapida con cobertura
        run: |
          mkdir -p reports
          uv run pytest \
            tests/test_carrito.py \
            tests/features/ \
            tests/test_funcional.py \
            tests/test_tabla_decision.py \
            tests/security/ \
            --cov=src \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=html:reports/htmlcov \
            --cov-report=term-missing \
            --cov-fail-under=${{ env.MIN_COVERAGE }} \
            -v --tb=short \
            --junit-xml=reports/test_results.xml

      - name: Publicar reportes
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reportes-tests-rapidos
          path: reports/
          retention-days: 7

# =============================================================================
# JOB 2: Tests de integracion
#
# TestContainers levanta un contenedor PostgreSQL real dentro del runner de
# GitHub Actions. No requiere docker-compose ni configuracion externa.
# El driver de Docker esta disponible por defecto en ubuntu-latest.
# Los fixtures de conftest.py usan el patron rollback para aislar cada test.
# =============================================================================
  tests-integracion:
    name: Tests de Integracion
    runs-on: ubuntu-latest
    needs: tests-rapidos

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --dev

      - name: Ejecutar tests de integracion con TestContainers
        run: |
          uv run pytest tests/integration/ \
            -v --tb=short \
            --timeout=120 \
            -m integration

# =============================================================================
# JOB 3: Tests de sistema end-to-end
#
# Levanta el stack completo (PostgreSQL + API) con docker-compose.test.yml.
# Los tests en tests/system/ usan httpx.Client contra la API real en el puerto 8001.
# El bucle de espera verifica que la API responda antes de lanzar los tests.
# docker compose down -v al final limpia volumenes aunque los tests fallen.
# =============================================================================
  tests-sistema:
    name: Tests de Sistema E2E
    runs-on: ubuntu-latest
    needs: tests-integracion

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --dev

      - name: Levantar stack de pruebas con Docker Compose
        run: docker compose -f docker-compose.test.yml up -d --build

      - name: Esperar que la API este lista
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8001/carrito/health-check; then
              echo "API lista en el intento $i"
              exit 0
            fi
            echo "Intento $i/30, esperando 3s..."
            sleep 3
          done
          echo "La API no respondio en 90 segundos"
          docker compose -f docker-compose.test.yml logs
          exit 1

      - name: Ejecutar tests de sistema
        env:
          API_URL: http://localhost:8001
        run: |
          uv run pytest tests/system/ \
            -v --tb=short \
            -m system

      - name: Detener y limpiar stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

# =============================================================================
# JOB 4: Tests de rendimiento con Locust
#
# Solo corre en push a main para no ralentizar el ciclo de PRs.
# Levanta el mismo stack de test, ejecuta 50 usuarios durante 30 segundos
# y verifica los SLAs definidos: P95 < 500ms y tasa de error < 1%.
# =============================================================================
  tests-rendimiento:
    name: Tests de Rendimiento Locust
    runs-on: ubuntu-latest
    needs: tests-sistema
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --dev

      - name: Levantar stack de pruebas
        run: docker compose -f docker-compose.test.yml up -d --build

      - name: Esperar que la API este lista
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8001/carrito/health-check; then
              exit 0
            fi
            sleep 3
          done
          docker compose -f docker-compose.test.yml logs && exit 1

      - name: Ejecutar prueba de carga con Locust
        run: |
          mkdir -p reports/locust
          uv run locust \
            -f tests/performance/locustfile.py \
            --headless \
            --users 50 \
            --spawn-rate 10 \
            --run-time 30s \
            --host http://localhost:8001 \
            --csv reports/locust/resultados \
            --html reports/locust/reporte.html

      - name: Verificar SLAs de rendimiento
        run: |
          python3 - <<'EOF'
          import csv, sys

          with open('reports/locust/resultados_stats.csv') as f:
              for row in csv.DictReader(f):
                  if row['Name'] == 'Aggregated':
                      p95 = float(row['95%'])
                      total = max(float(row['Request Count']), 1)
                      error_rate = float(row['Failure Count']) / total

                      print(f"P95: {p95:.1f}ms (maximo: 500ms)")
                      print(f"Error rate: {error_rate:.2%} (maximo: 1%)")

                      if p95 > 500:
                          print(f"SLA VIOLADO: P95 {p95:.1f}ms > 500ms")
                          sys.exit(1)
                      if error_rate > 0.01:
                          print(f"SLA VIOLADO: Error rate {error_rate:.2%} > 1%")
                          sys.exit(1)
                      print("Todos los SLAs cumplidos")
          EOF

      - name: Detener stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

      - name: Guardar reporte de Locust
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: locust-reporte
          path: reports/locust/
          retention-days: 14
