# ================================================================
# PIPELINE CI/CD COMPLETO — TiendaUV
# ================================================================
# Integra todas las pruebas del proyecto:
#   ✅ Calidad de código (ruff lint + format)
#   ✅ Tests unitarios TDD — tests/test_carrito.py
#   ✅ Tests de aceptación BDD — tests/features/
#   ✅ Tests funcionales (equivalencia, límites, tablas, estados)
#   ✅ Tests de seguridad OWASP — tests/security/
#   ✅ Suite completa con cobertura unificada
#   ✅ Tests de rendimiento Locust (solo en push a main)
#
# Diagrama de dependencias:
#   codigo-quality
#        │
#        ▼
#   tests-unitarios
#        │
#        ├──────────────────────┬──────────────────────┐
#        ▼                      ▼                      ▼
#   tests-aceptacion-bdd  tests-funcionales    tests-seguridad
#        │                      │                      │
#        └──────────────────────┴──────────────────────┘
#                               │
#                               ▼
#                         suite-completa
#                               │
#                               ▼
#                        tests-rendimiento
#                       (solo push a main)
# ================================================================

name: Pipeline CI/CD TiendaUV

# ── Triggers ─────────────────────────────────────────────────────
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch: # Permite ejecución manual desde la UI de GitHub

# ── Variables globales ───────────────────────────────────────────
env:
  PYTHON_VERSION: "3.12"
  MIN_COVERAGE: "80" # Cobertura mínima aceptable (%)

# ================================================================
# JOB 1: Calidad de código
# Analiza el código antes de correr cualquier test.
# ================================================================
jobs:
  codigo-quality:
    name: 🔍 Calidad de Código
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4

      - name: ⚡ Instalar uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: 🐍 Configurar Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: 📦 Instalar dependencias
        run: uv sync --dev

      - name: 🎨 Verificar lint con ruff
        run: uv run ruff check src/ tests/ --output-format=github

      - name: 🔤 Verificar formato con ruff
        run: uv run ruff format --check src/ tests/

# ================================================================
# JOB 2: Tests unitarios TDD + cobertura
# Los tests más rápidos van primero.
# ================================================================
  tests-unitarios:
    name: 🟢 Tests Unitarios TDD
    runs-on: ubuntu-latest
    needs: codigo-quality

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --dev

      - name: 🧪 Ejecutar tests unitarios TDD con cobertura
        run: |
          mkdir -p reports
          uv run pytest tests/test_carrito.py \
            --cov=src \
            --cov-report=xml:reports/coverage_unit.xml \
            --cov-report=html:reports/htmlcov \
            --cov-report=term-missing \
            --cov-fail-under=${{ env.MIN_COVERAGE }} \
            -v \
            --tb=short

      - name: 📊 Publicar reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-unitarios
          path: reports/
          retention-days: 7

# ================================================================
# JOB 3: Tests de aceptación BDD
# Valida el comportamiento desde la perspectiva del negocio.
# ================================================================
  tests-aceptacion-bdd:
    name: 🎭 Tests de Aceptación BDD
    runs-on: ubuntu-latest
    needs: tests-unitarios

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --dev

      - name: 🥒 Ejecutar todos los scenarios BDD
        run: |
          uv run pytest tests/features/ \
            -v \
            --tb=short \
            -m "smoke or critical or regression"

      - name: 💨 Verificar subset crítico (@smoke)
        run: |
          uv run pytest tests/features/ \
            -v \
            -m smoke \
            --tb=short

# ================================================================
# JOB 4: Tests funcionales con técnicas de diseño
# Equivalencia, límites, tablas de decisión, transición de estados.
# Corre en paralelo con BDD y seguridad.
# ================================================================
  tests-funcionales:
    name: 🎯 Tests Funcionales
    runs-on: ubuntu-latest
    needs: tests-unitarios

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --dev

      - name: ✂️ Partición de equivalencia y valores límite
        run: |
          uv run pytest tests/test_funcional.py \
            -v --tb=short \
            -k "Particion or Limite or limite or particion"

      - name: 📊 Tabla de decisión
        run: |
          uv run pytest tests/test_tabla_decision.py \
            -v --tb=short

      - name: 🔄 Transición de estados
        run: |
          uv run pytest tests/test_funcional.py \
            -v --tb=short \
            -k "Transicion or transicion"

      - name: 🎯 Suite funcional completa con cobertura
        run: |
          mkdir -p reports
          uv run pytest \
            tests/test_funcional.py \
            tests/test_tabla_decision.py \
            -v --tb=short \
            --cov=src \
            --cov-report=xml:reports/coverage_functional.xml

      - name: 📤 Publicar reporte funcional
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-funcional
          path: reports/

# ================================================================
# JOB 5: Tests de seguridad OWASP
# Corre en paralelo con funcionales y BDD.
# ================================================================
  tests-seguridad:
    name: 🔐 Tests de Seguridad OWASP
    runs-on: ubuntu-latest
    needs: tests-unitarios

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --dev

      - name: 🛡️ Ejecutar tests de seguridad OWASP
        run: |
          uv run pytest tests/security/ \
            -v --tb=short

      - name: 📦 Auditar vulnerabilidades en dependencias
        run: |
          mkdir -p reports
          uv add --dev pip-audit
          uv run pip-audit --format=json > reports/security_audit.json || true
          uv run pip-audit || echo "⚠️ Revisar vulnerabilidades en dependencias"

      - name: 📤 Guardar reporte de seguridad
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: reports/security_audit.json

# ================================================================
# JOB 6: Suite completa integrada (89 tests)
# Espera a que BDD, funcionales y seguridad hayan pasado.
# Genera el reporte de cobertura unificado.
# ================================================================
  suite-completa:
    name: 🧩 Suite Completa Integrada
    runs-on: ubuntu-latest
    needs:
      - tests-aceptacion-bdd
      - tests-funcionales
      - tests-seguridad

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --dev

      - name: 🚀 Ejecutar suite completa (89 tests)
        run: |
          mkdir -p reports
          uv run pytest \
            tests/test_carrito.py \
            tests/features/ \
            tests/test_funcional.py \
            tests/test_tabla_decision.py \
            tests/security/ \
            --cov=src \
            --cov-report=xml:reports/coverage_total.xml \
            --cov-report=html:reports/htmlcov_total \
            --cov-report=term-missing \
            --cov-fail-under=${{ env.MIN_COVERAGE }} \
            -v --tb=short \
            --junit-xml=reports/test_results.xml

      - name: 📊 Publicar reporte unificado
        uses: actions/upload-artifact@v4
        with:
          name: suite-completa-reporte
          path: reports/
          retention-days: 30

      - name: 📋 Comentar resultado en Pull Request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Suite completa pasó** — 89 tests, cobertura ≥ 80%'
            })

# ================================================================
# JOB 7: Tests de rendimiento con Locust
# Solo corre en push a main (no en cada PR — sería demasiado lento).
# Levanta la API, corre 30 segundos de carga y verifica los SLAs.
# ================================================================
  tests-rendimiento:
    name: ⚡ Tests de Rendimiento (Locust)
    runs-on: ubuntu-latest
    needs: suite-completa
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --dev

      - name: 🚀 Levantar la API en background
        run: |
          uv run uvicorn src.carrito.api:app \
            --host 0.0.0.0 \
            --port 8000 &
          echo $! > /tmp/api.pid
          sleep 5

      - name: ✅ Verificar que la API responde
        run: |
          curl -f http://localhost:8000/carrito/health-check \
            || (echo "❌ La API no responde" && exit 1)
          echo "✅ API lista para recibir carga"

      - name: 🦗 Ejecutar prueba de carga (30 segundos, 50 usuarios)
        run: |
          mkdir -p reports/locust
          uv run locust \
            -f tests/performance/locustfile.py \
            --headless \
            --users 50 \
            --spawn-rate 10 \
            --run-time 30s \
            --host http://localhost:8000 \
            --csv reports/locust/resultados \
            --html reports/locust/reporte.html \
            --exit-code-on-error 1

      - name: 📉 Verificar SLAs de rendimiento
        run: |
          python3 - <<'EOF'
          import csv, sys

          with open('reports/locust/resultados_stats.csv') as f:
              reader = csv.DictReader(f)
              for row in reader:
                  if row['Name'] == 'Aggregated':
                      p95 = float(row['95%'])
                      failure_rate = float(row['Failure Count']) / max(float(row['Request Count']), 1)

                      print(f"P95: {p95:.1f}ms  (máximo permitido: 500ms)")
                      print(f"Error rate: {failure_rate:.2%}  (máximo permitido: 1%)")

                      if p95 > 500:
                          print(f"❌ SLA VIOLADO: P95 {p95:.1f}ms > 500ms")
                          sys.exit(1)

                      if failure_rate > 0.01:
                          print(f"❌ SLA VIOLADO: Error rate {failure_rate:.2%} > 1%")
                          sys.exit(1)

                      print("✅ Todos los SLAs cumplidos")
          EOF

      - name: 🛑 Detener la API
        if: always()
        run: |
          if [ -f /tmp/api.pid ]; then
            kill $(cat /tmp/api.pid) 2>/dev/null || true
          fi

      - name: 📤 Guardar reporte de Locust
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: locust-reporte
          path: reports/locust/
          retention-days: 14
