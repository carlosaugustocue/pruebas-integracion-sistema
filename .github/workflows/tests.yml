name: Tests TDD + BDD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Configurar Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Instalar dependencias del proyecto
        run: uv sync --dev

      - name: Ejecutar tests TDD con cobertura
        run: uv run pytest tests/test_carrito.py --cov=src --cov-report=term-missing -v

      - name: Ejecutar tests BDD
        run: uv run pytest tests/features/ -v

      - name: Ejecutar suite completa con reporte de cobertura
        run: uv run pytest --cov=src --cov-report=term-missing --cov-report=xml -v

      - name: Subir reporte de cobertura
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false
