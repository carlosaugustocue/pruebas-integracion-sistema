services:
  db-test:
    image: postgres:16-alpine
    container_name: tiendauv_db_test
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: tiendauv_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test"]
      interval: 3s
      timeout: 3s
      retries: 10

  api-test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tiendauv_api_test
    environment:
      DATABASE_URL: postgresql://test:test@db-test:5432/tiendauv_test
    ports:
      - "8001:8000"
    depends_on:
      db-test:
        condition: service_healthy
