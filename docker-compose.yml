services:
  db:
    image: postgres:16-alpine
    container_name: tiendauv_db
    environment:
      POSTGRES_USER: tiendauv
      POSTGRES_PASSWORD: tiendauv_pass
      POSTGRES_DB: tiendauv
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tiendauv"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tiendauv_api
    environment:
      DATABASE_URL: postgresql://tiendauv:tiendauv_pass@db:5432/tiendauv
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  postgres_data:
